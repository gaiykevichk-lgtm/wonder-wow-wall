project_dir: wonder-wow-wall

services:
  db:
    friendly_name: "База данных PostgreSQL"
    description: "Primary PostgreSQL database for Wonder Wow Wall"
    purpose: "Хранение данных о панелях, заказах, пользователях и подписках"
    order: 1
    type: database
    framework: postgresql
    preset_id: 357
    env_vars:
      - DATABASE_URL

  redis:
    friendly_name: "Redis кеш"
    description: "Redis cache and session store"
    purpose: "Кеширование и хранение сессий"
    order: 2
    type: database
    framework: redis
    preset_id: 3683
    env_vars:
      - REDIS_URL

  api:
    friendly_name: "API сервер"
    description: "FastAPI backend for Wonder Wow Wall"
    purpose: "REST API для каталога, заказов, авторизации и подписок"
    order: 3
    type: backend
    framework: docker
    preset_id: 1003
    build_command: "docker build -t app ."
    start_command: "uvicorn app.main:app --host 0.0.0.0 --port 8080"
    root_dir: "backend"
    env_file: ".env"
    env_vars:
      - DATABASE_URL
      - REDIS_URL
      - JWT_SECRET
      - CORS_ORIGINS

  web:
    friendly_name: "Веб-сайт Wonder Wow Wall"
    description: "React SPA frontend"
    purpose: "Интерфейс для каталога панелей, конструктора, фото-редактора и оформления заказов"
    order: 4
    type: frontend
    framework: react
    preset_id: 2785
    build_command: "npm install && npm run build"
    publish_dir: dist
    root_dir: "frontend"
    env_file: ".env"
    env_vars: []
